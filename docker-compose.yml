version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: spark-nexus-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
